<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PD.AI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --bg: #050816;
            --panel: rgba(10, 15, 35, 0.78);
            --panel-strong: rgba(12, 18, 40, 0.94);
            --border: rgba(255, 255, 255, 0.12);
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-2: #22d3ee;
            --danger: #fb7185;
            --shadow: 0 18px 60px rgba(2, 8, 23, 0.45);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(139, 92, 246, 0.35), transparent 24%),
                radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.25), transparent 28%),
                linear-gradient(145deg, #020617 0%, var(--bg) 50%, #111827 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
            pointer-events: none;
        }

        .auth-shell {
            width: min(100%, 1120px);
            display: grid;
            place-items: center;
        }

        .auth-card {
            width: min(100%, 460px);
            padding: 34px;
            border-radius: 28px;
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .brand-badge {
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(139,92,246,0.26), rgba(34,211,238,0.16));
            color: #e9d5ff;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }

        .auth-hero h1 {
            font-size: 2rem;
            margin: 0 0 8px;
            font-weight: 700;
        }

        .auth-hero p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.7;
        }

        .auth-form {
            display: grid;
            gap: 14px;
        }

        .field-group {
            display: grid;
            gap: 8px;
        }

        .field-group label {
            font-size: 0.9rem;
            color: #dbeafe;
            font-weight: 600;
        }

        .field-group input {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.06);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }

        .field-group input:focus {
            border-color: rgba(34, 211, 238, 0.75);
            transform: translateY(-1px);
        }

        .primary-btn {
            border: none;
            padding: 13px 16px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 30px rgba(34, 211, 238, 0.2);
        }

        .primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(139, 92, 246, 0.28);
        }

        .error-box {
            padding: 12px 13px;
            border-radius: 12px;
            background: rgba(251, 113, 133, 0.12);
            color: #fecdd3;
            border: 1px solid rgba(251, 113, 133, 0.28);
            font-size: 0.95rem;
        }

        .auth-footer {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: #c4b5fd;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body { padding: 16px; }
            .auth-card { padding: 24px; }
            .auth-hero h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
